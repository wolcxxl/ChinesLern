        const App = () => {

        const ThemeSelector = ({ onSelect }) => {

                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">

                                <img src={theme.image} alt={theme.name} className="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                                <div className="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/60 to-transparent"></div>

        const LearningScreen = ({ theme, onBack }) => {
            const [mode, setMode] = useState('words'); // 'words' или 'sentences'
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(2.5); // Секунды
            const [fadeKey, setFadeKey] = useState(0); // Для анимации смены текста
            
            // Расширяем базу для имитации "100+" для пользователя, повторяя массив (в реальной версии тут просто большой массив)
            const items = mode === 'words' ? theme.words : theme.sentences;
            
            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        handleNext();
                    }, speed * 1000);
                }
                return () => clearInterval(interval);
            }, [isPlaying, speed, currentIndex, mode]);

            const handleNext = () => {
                setCurrentIndex(prev => (prev + 1) % items.length);
                setFadeKey(prev => prev + 1);
            };

            const handlePrev = () => {
                setCurrentIndex(prev => (prev - 1 + items.length) % items.length);
                setFadeKey(prev => prev + 1);
            };

            const togglePlay = () => setIsPlaying(!isPlaying);

            // Аудио функции
            const playAudio = (text, isSlow = false) => {
                if (mode === 'words') {
                    // API Youdao для слов (отлично работает для коротких фраз)
                    const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=zh`;
                    const audio = new Audio(audioUrl);
                    if (isSlow) audio.playbackRate = 0.5;
                    audio.play().catch(e => console.log("Audio play prevented by browser", e));
                } else {
                    // Встроенный TTS для предложений
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel(); // Остановка текущего
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'zh-CN';
                        utterance.rate = isSlow ? 0.5 : 0.9;
                        window.speechSynthesis.speak(utterance);
                    } else {
                        alert("Ваш браузер не поддерживает чтение текста (TTS).");
                    }
                }
            };

            const currentItem = items[currentIndex];

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Верхняя панель */}
                    <header className="p-3 sm:p-4 flex items-center justify-between bg-gray-800 shadow-md relative z-10 gap-2">
                        <button onClick={onBack} className="p-2 hover:bg-gray-700 rounded-full transition text-gray-300 flex-shrink-0">
                            <IconBack />
                        </button>
                        <h2 className="text-lg sm:text-xl font-bold text-blue-400 hidden sm:block truncate">{theme.name}</h2>
                        
                        {/* Переключатель Слова/Предложения */}
                        <div className="flex bg-gray-900 rounded-lg p-1 flex-shrink-0">
                            <button 
                                onClick={() => { setMode('words'); setCurrentIndex(0); setFadeKey(k=>k+1); }}
                                className={`px-3 sm:px-4 py-1 sm:py-1.5 rounded-md text-xs sm:text-sm font-medium transition ${mode === 'words' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                            >
                                Слова
                            </button>
                            <button 
                                onClick={() => { setMode('sentences'); setCurrentIndex(0); setFadeKey(k=>k+1); }}
                                className={`px-3 sm:px-4 py-1 sm:py-1.5 rounded-md text-xs sm:text-sm font-medium transition ${mode === 'sentences' ? 'bg-blue-600 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                            >
                                Предложения
                            </button>
                        </div>
                    </header>

                    {/* Главная карточка (Слова) */}
                    <main className="flex-1 flex flex-col items-center justify-center p-4 sm:p-6 text-center relative overflow-hidden">
                        {/* Фоновое размытое изображение темы */}
                        <div 
                            className="absolute inset-0 opacity-10 blur-xl scale-110"
                            style={{ backgroundImage: `url(${theme.image})`, backgroundSize: 'cover', backgroundPosition: 'center' }}
                        ></div>
                        
                        <div key={fadeKey} className="fade-in flex flex-col items-center z-10 w-full max-w-4xl">
                            
                            {/* Китайский текст и кнопки озвучки */}
                            <div className="flex flex-col md:flex-row items-center justify-center mb-6 relative w-full px-2 sm:px-4">
                                <h1 className="zh-text text-4xl sm:text-6xl md:text-7xl lg:text-8xl font-bold text-white mb-2 leading-tight break-words text-center">
                                    {currentItem.zh}
                                </h1>
                                
                                <div className="flex flex-row md:flex-col gap-3 sm:gap-4 mt-6 md:mt-0 md:absolute md:-right-16 lg:-right-24">
                                    <button onClick={() => playAudio(currentItem.zh, false)} className="p-3 sm:p-4 bg-blue-600 hover:bg-blue-500 rounded-full shadow-lg transition transform hover:scale-110 tooltip-container group">
                                        <IconRabbit />
                                        <span className="absolute left-full ml-2 w-max bg-gray-800 text-xs text-white p-1 rounded opacity-0 group-hover:opacity-100 transition pointer-events-none hidden md:block">Быстро</span>
                                    </button>
                                    <button onClick={() => playAudio(currentItem.zh, true)} className="p-3 sm:p-4 bg-emerald-600 hover:bg-emerald-500 rounded-full shadow-lg transition transform hover:scale-110 tooltip-container group">
                                        <IconTurtle />
                                        <span className="absolute left-full ml-2 w-max bg-gray-800 text-xs text-white p-1 rounded opacity-0 group-hover:opacity-100 transition pointer-events-none hidden md:block">Медленно</span>
                                    </button>
                                </div>
                            </div>

                            {/* Пиньинь */}
                            <p className="text-2xl sm:text-3xl md:text-4xl text-emerald-400 font-semibold mb-6 md:mb-8 drop-shadow-md px-4 text-center">
                                {currentItem.py}
                            </p>

                            {/* Перевод */}
                            <p className="text-2xl sm:text-3xl md:text-4xl lg:text-5xl text-gray-200 font-medium drop-shadow-md px-4 text-center break-words">
                                {currentItem.ru}
                            </p>
                        </div>
                    </main>

                    {/* Панель управления снизу */}
                    <footer className="bg-gray-800 p-4 sm:p-6 shadow-xl relative z-10 w-full">
                        <div className="max-w-2xl mx-auto flex flex-col items-center gap-4 sm:gap-6 w-full">
                            
                            {/* Навигация */}
                            <div className="flex items-center gap-4 sm:gap-8">
                                <button onClick={handlePrev} className="p-3 sm:p-4 bg-gray-700 hover:bg-gray-600 rounded-full transition shadow text-white">
                                    <IconPrev />
                                </button>
                                
                                <button onClick={togglePlay} className={`p-4 sm:p-6 rounded-full transition shadow-xl text-white transform hover:scale-105 ${isPlaying ? 'bg-red-500 hover:bg-red-400' : 'bg-blue-600 hover:bg-blue-500'}`}>
                                    {isPlaying ? <IconPause /> : <IconPlay />}
                                </button>
                                
                                <button onClick={handleNext} className="p-3 sm:p-4 bg-gray-700 hover:bg-gray-600 rounded-full transition shadow text-white">
                                    <IconNext />
                                </button>
                            </div>

                            {/* Ползунок времени */}
                            <div className="w-full flex items-center gap-2 sm:gap-4 bg-gray-900 p-3 sm:p-4 rounded-xl">
                                <span className="text-xs sm:text-sm font-bold text-gray-400 w-10 sm:w-12 text-right">0.5s</span>
                                <input 
                                    type="range" 
                                    min="0.5" max="5" step="0.5" 
                                    value={speed}
                                    onChange={(e) => setSpeed(parseFloat(e.target.value))}
                                />
                                <span className="text-xs sm:text-sm font-bold text-blue-400 w-12 sm:w-16">{speed}s</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
